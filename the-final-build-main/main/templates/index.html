{% block content %}
    <h1>{{ username }}</h1>

    <h2>Зарегистрированные пользователи:</h2>
    <ul>
        {% for user in users %}
            <li>
                {{ user.username }}
                ({{ user.name }} {{ user.surname }})
                {% if user.email %}- {{ user.email }}{% endif %}
            </li>
        {% endfor %}
    </ul>
{% endblock %}

<a href="account/login/">Логин</a>
<a href="account/signup/">Регистрация</a>
